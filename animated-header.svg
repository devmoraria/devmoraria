<svg width="620" height="130" viewBox="0 0 620 130" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9B59B6">
        <animate attributeName="stop-color" values="#9B59B6;#8E44AD;#5DADE2;#9B59B6" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#5DADE2">
        <animate attributeName="stop-color" values="#5DADE2;#9B59B6;#8E44AD;#5DADE2" dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <clipPath id="reveal-name">
      <rect x="0" y="0" width="0" height="130">
        <animate attributeName="width"
          values="0;450;450;450;0;0"
          keyTimes="0;0.30;0.55;0.62;0.68;1"
          dur="7s" repeatCount="indefinite"/>
      </rect>
    </clipPath>

    <clipPath id="reveal-role">
      <rect x="0" y="0" width="0" height="130">
        <animate attributeName="width"
          values="0;0;0;390;390;390;0"
          keyTimes="0;0.30;0.40;0.62;0.85;0.92;1"
          dur="7s" repeatCount="indefinite"/>
      </rect>
    </clipPath>
  </defs>

  <text x="85" y="58" font-family="Poppins, 'Trebuchet MS', sans-serif" font-size="42" font-weight="600"
        fill="url(#grad)" clip-path="url(#reveal-name)">Cauan Morária</text>

  <rect y="34" width="4" height="44" fill="#9B59B6" clip-path="url(#reveal-name)">
    <animate attributeName="x" values="85;535;535" keyTimes="0;0.30;1" dur="7s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0" dur="0.7s" repeatCount="indefinite"/>
  </rect>

  <text x="85" y="95" font-family="'Trebuchet MS', sans-serif" font-size="20" font-weight="400"
        fill="#B39DDB" clip-path="url(#reveal-role)">Product Owner · Desenvolvedor</text>

  <rect y="80" width="3" height="20" fill="#B39DDB" clip-path="url(#reveal-role)">
    <animate attributeName="x" values="85;475;475" keyTimes="0;0.40;1" dur="7s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0" dur="0.7s" repeatCount="indefinite"/>
  </rect>
</svg>
