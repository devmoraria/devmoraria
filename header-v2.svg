<svg width="620" height="90" viewBox="0 0 620 90" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9B59B6"/>
      <stop offset="100%" stop-color="#5DADE2"/>
    </linearGradient>
    <style>
      .name {
        animation: fadeName 4s ease-in-out infinite;
      }
      @keyframes fadeName {
        0%   { opacity: 0.4; }
        50%  { opacity: 1; }
        100% { opacity: 0.4; }
      }
    </style>
  </defs>

  <text x="310" y="58" text-anchor="middle" font-family="'Trebuchet MS', Verdana, sans-serif"
        font-size="42" font-weight="700" fill="url(#grad)" class="name">Cauan Morária</text>
</svg>
